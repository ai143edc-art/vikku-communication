<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Microscope over circuit board">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a2456"/><stop offset="1" stop-color="#050f2a"/></linearGradient>
    <linearGradient id="mt" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5BB0FF"/><stop offset="1" stop-color="#1466E0"/></linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <g opacity=".1" stroke="#5BB0FF" stroke-width="1"><path d="M0 70h400M0 150h400M0 220h400M90 0v300M300 0v300"/></g>
  <!-- board under scope -->
  <rect x="120" y="210" width="180" height="60" rx="6" fill="#0c3a2a" stroke="#39d39a" stroke-width="1.5" opacity=".9"/>
  <g fill="#0a2e22" stroke="#39d39a" stroke-width="1" opacity=".8"><rect x="138" y="226" width="26" height="20" rx="2"/><rect x="180" y="230" width="16" height="12" rx="1.5"/><rect x="210" y="224" width="30" height="24" rx="2"/><rect x="256" y="230" width="14" height="12" rx="1.5"/></g>
  <g stroke="#7CF2C8" stroke-width="1" opacity=".5"><path d="M138 250h140M150 220v40"/></g>
  <!-- microscope -->
  <ellipse cx="170" cy="278" rx="70" ry="8" fill="#0a1c3e"/>
  <rect x="150" y="250" width="60" height="16" rx="4" fill="#13315f" stroke="#3a7bdc" stroke-width="1.5"/>
  <rect x="176" y="120" width="10" height="135" fill="#1a3e74" stroke="#3a7bdc" stroke-width="1"/>
  <path d="M181 140q60 0 70 40" fill="none" stroke="url(#mt)" stroke-width="9" stroke-linecap="round" filter="url(#gl)"/>
  <!-- eyepiece -->
  <rect x="240" y="96" width="20" height="46" rx="8" fill="#13315f" stroke="#5BB0FF" stroke-width="2"/>
  <circle cx="250" cy="96" r="13" fill="#0a2350" stroke="#5BB0FF" stroke-width="2"/>
  <!-- objective lens with light -->
  <rect x="236" y="176" width="28" height="26" rx="5" fill="#1a3e74" stroke="#5BB0FF" stroke-width="2"/>
  <circle cx="250" cy="206" r="7" fill="#38BDF8" filter="url(#gl)"/>
  <path d="M250 213l-16 24h32z" fill="#38BDF8" opacity=".18"/>
  <circle cx="250" cy="232" r="3" fill="#7CF2C8"/>
</svg>
