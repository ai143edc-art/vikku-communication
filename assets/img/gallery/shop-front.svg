<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Shop front illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a2456"/><stop offset="1" stop-color="#050f2a"/></linearGradient>
    <linearGradient id="sign" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2E8BFF"/><stop offset="1" stop-color="#1466E0"/></linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <g opacity=".1" stroke="#5BB0FF" stroke-width="1"><path d="M0 60h400M0 130h400M0 210h400M70 0v300M330 0v300"/></g>
  <g opacity=".5" stroke="#5BB0FF" stroke-width="1.5" fill="none"><path d="M40 250h30v-8h10M360 250h-30v-8h-10"/><circle cx="40" cy="250" r="2.5" fill="#38BDF8" stroke="none"/><circle cx="360" cy="250" r="2.5" fill="#38BDF8" stroke="none"/></g>
  <!-- building -->
  <rect x="90" y="95" width="220" height="150" rx="8" fill="#0c2c63" stroke="#3a7bdc" stroke-width="2"/>
  <!-- awning -->
  <path d="M82 95h236l-14 26H96z" fill="url(#sign)" filter="url(#gl)"/>
  <g stroke="#bcd9ff" stroke-width="1" opacity=".5"><path d="M120 95v26M160 95v26M200 95v26M240 95v26M280 95v26"/></g>
  <!-- sign text mark (phone) -->
  <rect x="186" y="64" width="28" height="22" rx="4" fill="#06183c" stroke="#5BB0FF" stroke-width="2"/>
  <rect x="195" y="71" width="10" height="8" rx="1.5" fill="#5BB0FF"/>
  <text x="200" y="56" text-anchor="middle" font-family="Poppins,Arial,sans-serif" font-size="13" font-weight="700" fill="#bcd9ff">VIKKU</text>
  <!-- window + door -->
  <rect x="108" y="135" width="120" height="80" rx="5" fill="#08213f" stroke="#3a7bdc" stroke-width="1.5"/>
  <g stroke="#5BB0FF" stroke-width="1" opacity=".4"><path d="M108 162h120M168 135v80"/></g>
  <rect x="244" y="150" width="50" height="95" rx="4" fill="#0a2a55" stroke="#3a7bdc" stroke-width="1.5"/>
  <circle cx="252" cy="200" r="2.5" fill="#5BB0FF"/>
  <!-- shutter accent glow -->
  <rect x="108" y="135" width="120" height="80" rx="5" fill="none" stroke="#38BDF8" stroke-width="1" opacity=".35" filter="url(#gl)"/>
  <text x="168" y="183" text-anchor="middle" font-family="Inter,Arial" font-size="11" fill="#7fb4ff" opacity=".8">REPAIR</text>
</svg>
